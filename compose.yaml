services:

  postgres:
    image: postgres:16

    environment:
      POSTGRES_DB: alta_demanda
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/alta_demanda
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: T0yobJEzaLBcqyYVdYoRTITpoBeXH3ckCmnLDfnshhv
      # Desativa a integração de dev docker-compose dentro do container
      SPRING_DOCKER_COMPOSE_ENABLED: "false"

    restart: on-failure

    depends_on:
      postgres:
        condition: service_healthy
