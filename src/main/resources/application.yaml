server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/alta_demanda
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  key: ${JWT_SECRET:teste123456789123456789123456789}
  expiration: 86400000